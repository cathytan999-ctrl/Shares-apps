<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Valuation Pro App</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;background:#0b1730;color:#fff;padding:20px}
.panel{background:#12233d;padding:15px;border-radius:12px;margin-bottom:20px}
input{padding:8px;margin:5px}
button{padding:10px;margin:5px}
table{width:100%;margin-top:10px;border-collapse:collapse}
td,th{padding:8px;border-bottom:1px solid #333}
</style>
</head>

<body>

<h1>Stock Valuation Pro</h1>

<div class="panel">
<h2>Inputs</h2>
Price <input id="price" type="number"><br>
EPS <input id="eps" type="number"><br>
Growth % <input id="growth" type="number"><br>

<h3>Analyst Mode</h3>
EPS 2027 <input id="eps1" type="number"><br>
EPS 2028 <input id="eps2" type="number"><br>
EPS 2029 <input id="eps3" type="number"><br>

Confidence 
<select id="confidence">
<option value="high">High</option>
<option value="medium" selected>Medium</option>
<option value="low">Low</option>
</select>

<br><br>
<button onclick="captureBefore()">Capture Before</button>
<button onclick="calculate()">Calculate</button>
</div>

<div class="panel">
<h2>Valuation</h2>
Fair PE: <span id="pe"></span><br>
Intrinsic: <span id="intrinsic"></span>
</div>

<div class="panel">
<h2>Future Prices</h2>
<table>
<tr><th></th><th>2027</th><th>2028</th></tr>
<tr><td>Base</td><td id="p1"></td><td id="p2"></td></tr>
</table>
</div>

<div class="panel">
<h2>Earnings Impact</h2>
<table>
<tr><th></th><th>Before</th><th>After</th><th>Change</th></tr>
<tr><td>EPS</td><td id="bEPS"></td><td id="aEPS"></td><td id="cEPS"></td></tr>
<tr><td>PE</td><td id="bPE"></td><td id="aPE"></td><td id="cPE"></td></tr>
<tr><td>Intrinsic</td><td id="bIV"></td><td id="aIV"></td><td id="cIV"></td></tr>
</table>
</div>

<script>

let before = null;

function captureBefore(){
  before = {
    eps: document.getElementById("eps1").value,
    pe: document.getElementById("pe").innerText,
    iv: document.getElementById("intrinsic").innerText
  };
}

function calculate(){

let eps1 = parseFloat(document.getElementById("eps1").value);
let eps2 = parseFloat(document.getElementById("eps2").value);
let eps3 = parseFloat(document.getElementById("eps3").value);
let confidence = document.getElementById("confidence").value;

let growth = ((eps3/eps1)**(1/2)-1)*100;

let pe = 15 + growth*1.2;
if(confidence=="high") pe+=2;
if(confidence=="low") pe-=3;

let intrinsic = eps1 * pe;

document.getElementById("pe").innerText = pe.toFixed(1);
document.getElementById("intrinsic").innerText = intrinsic.toFixed(2);

document.getElementById("p1").innerText = (eps1*pe).toFixed(2);
document.getElementById("p2").innerText = (eps2*pe).toFixed(2);

if(before){
document.getElementById("bEPS").innerText = before.eps;
document.getElementById("aEPS").innerText = eps1;
document.getElementById("cEPS").innerText = ((eps1-before.eps)/before.eps*100).toFixed(1)+"%";

document.getElementById("bPE").innerText = before.pe;
document.getElementById("aPE").innerText = pe.toFixed(1);

document.getElementById("bIV").innerText = before.iv;
document.getElementById("aIV").innerText = intrinsic.toFixed(2);
}

}

</script>

</body>
</html>
